<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cinezor</title>
  <link rel="stylesheet" href="/style.css">

  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7540600881512986"
    crossorigin="anonymous"></script>
</head>

<body>
  <div class="container">

    <section class="hero">
      <div>
        <h1>Cinezor</h1>
        <p>Assista aos conteúdos disponíveis para seu acesso.</p>
      </div>

      <div class="hero-actions">
        <button class="btn btn-logout" onclick="logout()">Sair</button>
      </div>
    </section>

    <section class="stats">
      <div class="stat-card">
        <span>Total de conteúdos</span>
        <strong id="totalCanaisCliente">0</strong>
      </div>

      <div class="stat-card">
        <span>Status</span>
        <strong>Premium</strong>
      </div>

      <div class="stat-card">
        <span>Acesso</span>
        <strong>Liberado</strong>
      </div>
    </section>

    <section class="channels-card">
      <div class="channels-top">
        <div>
          <h2>Catálogo disponível</h2>
          <p>Escolha uma categoria e assista ao conteúdo desejado.</p>
        </div>
      </div>

      <div class="search-box">
        <input type="text" id="buscaCliente" placeholder="Buscar conteúdo...">
      </div>

      <div class="category-filters">
        <button class="btn btn-filter active" onclick="filtrarCategoria('Todos')">Todos</button>
        <button class="btn btn-filter" onclick="filtrarCategoria('Filme')">Filme</button>
        <button class="btn btn-filter" onclick="filtrarCategoria('Série')">Série</button>
        <button class="btn btn-filter" onclick="filtrarCategoria('Anime')">Anime</button>
        <button class="btn btn-filter" onclick="filtrarCategoria('Trailer')">Trailer</button>
      </div>

      <div id="listaCanais" class="channel-grid"></div>
    </section>

  </div>

  <div id="playerModal" class="modal">
    <div class="modal-box">
      <div class="modal-header">
        <h3 id="playerTitle">Reprodução</h3>
        <button class="close-btn" onclick="fecharPlayer()">Fechar</button>
      </div>

      <div class="modal-content">
        <video id="videoPlayer" controls playsinline webkit-playsinline
          style="display:block; width:100%; border-radius:16px;"></video>

        <iframe id="embedFrame" style="display:none; width:100%; height:70vh; border:none; border-radius:16px;"
          allowfullscreen referrerpolicy="origin"></iframe>

        <p class="player-note">Reprodução online com suporte HLS, MP4 e conteúdo incorporado.</p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <script src="/app.js"></script>
</body>

</html>
